<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">VitorConvert | PDF & Image Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Reset e Base conforme sua aparência desejada */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top, #0d1e31 0%, #061424 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 500px; position: relative; z-index: 10; }

        /* SELETOR DE IDIOMAS - Topo Direito */
        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 25px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #b0b0b0;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .lang-btn:hover, .lang-btn.active {
            background: #00d2ff;
            color: #061424;
            border-color: #00d2ff;
        }

        /* LOGO */
        header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 2.8rem; font-weight: 800; margin-bottom: 8px; display: flex; justify-content: center; align-items: center; }
        .logo span { background: #00d2ff; color: #061424; padding: 2px 10px; border-radius: 8px; margin-left: 8px; font-size: 2.2rem; }
        header p { font-size: 0.9rem; opacity: 0.8; }

        /* CARD CENTRAL */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 40px;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 30px; }
        .btn-mode {
            flex: 1; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; transition: 0.3s;
        }
        .btn-mode.active { background: rgba(255, 255, 255, 0.1); border-color: #00d2ff; }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 50px 20px;
            margin-bottom: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .drop-zone:hover { border-color: #00d2ff; background: rgba(0, 210, 255, 0.05); }

        .btn-main {
            background: #00d2ff; color: #061424; border: none; width: 100%;
            padding: 18px; border-radius: 15px; font-weight: 800; font-size: 1rem;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .btn-main:hover { box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); transform: translateY(-2px); }

        footer { margin-top: 40px; text-align: center; font-size: 0.7rem; opacity: 0.4; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-switcher">
            <button class="lang-btn" id="btn-pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" id="btn-es" onclick="changeLanguage('es')">ES</button>
        </div>

        <header>
            <div class="logo">Vitor<span>Convert</span></div>
            <p data-i18n="header-p">O jeito mais rápido de transformar seus documentos com segurança.</p>
        </header>

        <main class="card">
            <div class="mode-selector">
                <button class="btn-mode active" id="mode-pdf" onclick="switchMode('pdf')" data-i18n="mode-pdf">PDF para Word</button>
                <button class="btn-mode" id="mode-img" onclick="switchMode('img')" data-i18n="mode-img">Imagem para PDF</button>
            </div>

            <div class="drop-zone" id="dropZone">
                <h3 id="mainText" data-i18n="drop-h3">Selecione o arquivo ou arraste aqui</h3>
                <p id="subText" data-i18n="drop-p">Arquivos suportados: .pdf</p>
            </div>
            
            <input type="file" id="fileInput" style="display: none;">
            <button class="btn-main" id="btnMainAction" data-i18n="btn-main">Escolher Arquivo</button>
        </main>

        <footer>
            <p>© 2026 VITORCONVERT • <span data-i18n="footer-span">PROCESSAMENTO LOCAL SEGURO</span></p>
        </footer>
    </div>
