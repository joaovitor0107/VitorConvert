<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">VitorConvert | PDF & Image Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS INTEGRADO PARA NÃO BUGAR NO VERCEL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top, #0d1e31 0%, #061424 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 500px; position: relative; }

        /* Idiomas no topo direito conforme a foto */
        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .lang-btn.active { background: #00d2ff; color: #000; border-color: #00d2ff; font-weight: bold; }

        /* Logo com retângulo azul */
        header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 2.5rem; font-weight: 800; display: flex; justify-content: center; align-items: center; }
        .logo span { background: #00d2ff; color: #061424; padding: 2px 10px; border-radius: 8px; margin-left: 8px; }
        header p { opacity: 0.8; font-size: 0.9rem; margin-top: 15px; line-height: 1.4; }

        /* Card Central (Estilo Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 35px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-mode {
            flex: 1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.8rem;
        }
        .btn-mode.active { background: rgba(255,255,255,0.1); border-color: #00d2ff; }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 50px 20px;
            margin-bottom: 25px;
        }

        .btn-main {
            background: #00d2ff;
            color: #061424;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main:hover { box-shadow: 0 0 15px rgba(0, 210, 255, 0.5); transform: translateY(-2px); }

        footer { margin-top: 40px; text-align: center; font-size: 0.7rem; opacity: 0.4; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-switcher">
            <button class="lang-btn" id="btn-pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" id="btn-es" onclick="changeLanguage('es')">ES</button>
        </div>

        <header>
            <div class="logo">Vitor<span>Convert</span></div>
            <p data-i18n="header-p">O jeito mais rápido de transformar seus documentos com segurança.</p>
        </header>

        <main class="card">
            <div class="mode-selector">
                <button class="btn-mode active" data-i18n="mode-pdf">PDF para Word</button>
                <button class="btn-mode" data-i18n="mode-img">Imagem para PDF</button>
            </div>

            <div class="drop-zone">
                <h3 data-i18n="drop-h3">Selecione o arquivo ou arraste aqui</h3>
                <p data-i18n="drop-p">Arquivos suportados: .pdf</p>
            </div>
            
            <button class="btn-main" data-i18n="btn-main">Escolher Arquivo</button>
        </main>

        <footer>
            <p>© 2026 VITORCONVERT • <span data-i18n="footer-span">PROCESSAMENTO LOCAL SEGURO</span></p>
        </footer>
    </div>

    <script>
        const translations = {
            pt: {
                "page-title": "VitorConvert | PDF & Image Converter",
                "header-p": "O jeito mais rápido de transformar seus documentos com segurança.",
                "mode-pdf": "PDF para Word",
                "mode-img": "Imagem para PDF",
                "drop-h3": "Selecione o arquivo ou arraste aqui",
                "drop-p": "Arquivos suportados: .pdf",
                "btn-main": "Escolher Arquivo",
                "footer-span": "PROCESSAMENTO LOCAL SEGURO"
            },
            en: {
                "page-title": "VitorConvert | PDF & Image Converter",
                "header-p": "The fastest way to transform your documents securely.",
                "mode-pdf": "PDF to Word",
                "mode-img": "Image to PDF",
                "drop-h3": "Select file or drag here",
                "drop-p": "Supported files: .pdf",
                "btn-main": "Choose File",
                "footer-span": "SECURE LOCAL PROCESSING"
            },
            es: {
                "page-title": "VitorConvert | Convertidor de PDF e Imagen",
                "header-p": "La forma más rápida de transformar sus documentos de forma segura.",
                "mode-pdf": "PDF a Word",
                "mode-img": "Imagen a PDF",
                "drop-h3": "Seleccione el archivo o arrastre aquí",
                "drop-p": "Archivos soportados: .pdf",
                "btn-main": "Elegir Archivo",
                "footer-span": "PROCESAMIENTO LOCAL SEGURO"
            }
        };

        function changeLanguage(lang) {
            localStorage.setItem('prefLang', lang);
            
            // Troca textos
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerText = translations[lang][key];
            });

            // Troca o título da aba
            document.title = translations[lang]["page-title"];

            // Marca botão ativo
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
        }

        window.onload = () => {
            const saved = localStorage.getItem('prefLang') || 'pt';
            changeLanguage(saved);
        };
    </script>
</body>
</html>
