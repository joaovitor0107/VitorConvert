<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">VitorConvert | PDF & Image Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top, #0d1e31 0%, #061424 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        /* O container precisa estar acima de qualquer fundo para permitir cliques */
        .container { 
            width: 100%; 
            max-width: 500px; 
            position: relative; 
            z-index: 999; 
        }

        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
            pointer-events: auto; /* Garante que aceite o clique */
        }

        .lang-btn.active { background: #00d2ff; color: #000; border-color: #00d2ff; font-weight: bold; }

        header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 2.5rem; font-weight: 800; display: flex; justify-content: center; align-items: center; }
        .logo span { background: #00d2ff; color: #061424; padding: 2px 10px; border-radius: 8px; margin-left: 8px; }
        header p { opacity: 0.8; font-size: 0.9rem; margin-top: 15px; }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 35px;
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-mode {
            flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 0.8rem;
            transition: 0.2s;
        }
        .btn-mode.active { background: rgba(255,255,255,0.15); border-color: #00d2ff; }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 50px 20px;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .btn-main {
            background: #00d2ff;
            color: #061424;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); }

        footer { margin-top: 40px; text-align: center; font-size: 0.7rem; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-switcher">
            <button class="lang-btn" id="btn-pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" id="btn-es" onclick="changeLanguage('es')">ES</button>
        </div>

        <header>
            <div class="logo">Vitor<span>Convert</span></div>
            <p data-i18n="header-p">O jeito mais rápido de transformar seus documentos com segurança.</p>
        </header>

        <main class="card">
            <div class="mode-selector">
                <button class="btn-mode active" id="mode-pdf" onclick="switchMode('pdf')" data-i18n="mode-pdf">PDF para Word</button>
                <button class="btn-mode" id="mode-img" onclick="switchMode('img')" data-i18n="mode-img">Imagem para PDF</button>
            </div>

            <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <h3 id="mainText" data-i18n="drop-h3">Selecione o arquivo ou arraste aqui</h3>
                <p id="subText" data-i18n="drop-p">Arquivos suportados: .pdf</p>
            </div>
            
            <input type="file" id="fileInput" style="display: none;">
            <button class="btn-main" onclick="document.getElementById('fileInput').click()" data-i18n="btn-main">Escolher Arquivo</button>
        </main>

        <footer>
            <p>© 2026 VITORCONVERT • <span data-i18n="footer-span">PROCESSAMENTO LOCAL SEGURO</span></p>
        </footer>
    </div>

    <script>
        const translations = {
            pt: {
                "header-p": "O jeito mais rápido de transformar seus documentos com segurança.",
                "mode-pdf": "PDF para Word", "mode-img": "Imagem para PDF",
                "drop-h3": "Selecione o arquivo ou arraste aqui", "drop-p": "Arquivos suportados: .pdf",
                "btn-main": "Escolher Arquivo", "footer-span": "PROCESSAMENTO LOCAL SEGURO"
            },
            en: {
                "header-p": "The fastest way to safely transform your documents.",
                "mode-pdf": "PDF to Word", "mode-img": "Image to PDF",
                "drop-h3": "Select file or drag here", "drop-p": "Supported files: .pdf",
                "btn-main": "Choose File", "footer-span": "SECURE LOCAL PROCESSING"
            },
            es: {
                "header-p": "La forma más rápida de transformar sus documentos de forma segura.",
                "mode-pdf": "PDF a Word", "mode-img": "Imagen a PDF",
                "drop-h3": "Seleccione el archivo o arrastre aquí", "drop-p": "Archivos soportados: .pdf",
                "btn-main": "Elegir Archivo", "footer-span": "PROCESAMIENTO LOCAL SEGURO"
            }
        };

        function changeLanguage(lang) {
            localStorage.setItem('prefLang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerText = translations[lang][key];
            });
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
        }

        function switchMode(mode) {
            document.querySelectorAll('.btn-mode').forEach(btn => btn.classList.remove('active'));
            if(mode === 'pdf') {
                document.getElementById('mode-pdf').classList.add('active');
                document.getElementById('subText').innerText = "Arquivos suportados: .pdf";
            } else {
                document.getElementById('mode-img').classList.add('active');
                document.getElementById('subText').innerText = "Arquivos suportados: .jpg, .png";
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('prefLang') || 'pt';
            changeLanguage(saved);
        };
    </script>
</body>
</html>
