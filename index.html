<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">VitorConvert</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top, #0d1e31 0%, #061424 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 500px; position: relative; z-index: 10; }

        /* Botões de idioma no topo direito */
        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .lang-btn.active { background: #00d2ff; color: #000; border-color: #00d2ff; }

        /* Estilo do Logo igual à imagem */
        header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 2.5rem; font-weight: 800; }
        .logo span { background: #00d2ff; color: #061424; padding: 2px 10px; border-radius: 8px; margin-left: 5px; }
        header p { opacity: 0.7; font-size: 0.9rem; margin-top: 10px; }

        /* Card Central */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px 20px;
            margin: 20px 0;
        }

        .btn-main {
            background: #00d2ff;
            color: #061424;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
        }

        footer { margin-top: 30px; text-align: center; font-size: 0.7rem; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-switcher">
            <button class="lang-btn" id="btn-pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" id="btn-es" onclick="changeLanguage('es')">ES</button>
        </div>

        <header>
            <div class="logo">Vitor<span>Convert</span></div>
            <p data-i18n="header-p">O jeito mais rápido de transformar seus documentos com segurança.</p>
        </header>

        <main class="card">
            <div class="drop-zone">
                <h3 data-i18n="drop-h3">Selecione o arquivo ou arraste aqui</h3>
                <p data-i18n="drop-p">Arquivos suportados: .pdf</p>
            </div>
            <button class="btn-main" data-i18n="btn-main">Escolher Arquivo</button>
        </main>

        <footer>
            <p>© 2026 VITORCONVERT • <span data-i18n="footer-span">PROCESSAMENTO LOCAL SEGURO</span></p>
        </footer>
    </div>

    <script>
        const translations = {
            pt: {
                "header-p": "O jeito mais rápido de transformar seus documentos com segurança.",
                "drop-h3": "Selecione o arquivo ou arraste aqui",
                "drop-p": "Arquivos suportados: .pdf",
                "btn-main": "Escolher Arquivo",
                "footer-span": "PROCESSAMENTO LOCAL SEGURO"
            },
            en: {
                "header-p": "The fastest way to safely transform your documents.",
                "drop-h3": "Select file or drag here",
                "drop-p": "Supported files: .pdf",
                "btn-main": "Choose File",
                "footer-span": "SECURE LOCAL PROCESSING"
            },
            es: {
                "header-p": "La forma más rápida de transformar sus documentos de forma segura.",
                "drop-h3": "Seleccione el archivo o arrastre aquí",
                "drop-p": "Archivos soportados: .pdf",
                "btn-main": "Elegir Archivo",
                "footer-span": "PROCESAMIENTO LOCAL SEGURO"
            }
        };

        function changeLanguage(lang) {
            // Salva a preferência
            localStorage.setItem('prefLang', lang);

            // Troca os textos
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerText = translations[lang][key];
            });

            // Ajusta visual dos botões
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
        }

        // Executa ao carregar
        window.onload = () => {
            const saved = localStorage.getItem('prefLang') || 'pt';
            changeLanguage(saved);
        };
    </script>
</body>
</html>
