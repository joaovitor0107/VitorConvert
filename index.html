<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitorConvert | PDF & Image Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-SEU_ID" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">Vitor<span>Convert</span></div>
            <p>Conversor Inteligente de Documentos</p>
        </header>

        <main class="card">
            <div class="ad-slot">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-SEU_ID" data-ad-slot="SLOT_ID" data-ad-format="auto"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="drop-zone" onclick="triggerInput()">
                <h3 id="mainText">Selecione o arquivo</h3>
                <p id="subText">PDF ou Imagens (.jpg, .png)</p>
            </div>
            
            <input type="file" id="fileInput" style="display: none;" onchange="handleFile(this.files[0])">
            
            <button class="btn-main" id="actionBtn" onclick="triggerInput()">Escolher Arquivo</button>

            <div class="ad-slot" style="margin-top: 20px;">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-SEU_ID" data-ad-slot="SLOT_ID" data-ad-format="auto"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
        </main>

        <footer>
            <p>© 2026 VITORCONVERT • PROCESSAMENTO LOCAL SEGURO</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
