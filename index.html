<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitorConvert | PDF & Image Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-SEU_ID_AQUI" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="lang-switcher">
            <button class="lang-btn active" id="btn-pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" id="btn-es" onclick="changeLanguage('es')">ES</button>
        </div>

        <header>
            <div class="logo">Vitor<span>Convert</span></div>
        </header>

        <main class="card">
            <div class="ad-container">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-SEU_ID_AQUI" data-ad-slot="SLOT_ID_AQUI" data-ad-format="auto" data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="mode-selector">
                <button class="btn-mode active" id="mode-pdf" onclick="switchMode('pdf')">PDF para Word</button>
                <button class="btn-mode" id="mode-img" onclick="switchMode('img')">Imagem para PDF</button>
            </div>

            <div class="drop-zone" id="dropZone" onclick="triggerInput()">
                <h3 id="mainText">Selecione o arquivo ou arraste aqui</h3>
                <p id="subText">Arquivos suportados: .pdf</p>
            </div>
            
            <input type="file" id="fileInput" style="display: none;" onchange="handleFile(this.files[0])">
            <button class="btn-main" id="actionBtn" onclick="triggerInput()">Escolher Arquivo</button>

            <div class="ad-container" style="margin-top: 20px;">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-SEU_ID_AQUI" data-ad-slot="SLOT_ID_AQUI" data-ad-format="auto" data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
        </main>

        <footer>
            <p>© 2026 VITORCONVERT • PROCESSAMENTO LOCAL SEGURO</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
