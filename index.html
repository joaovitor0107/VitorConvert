<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitorConvert | PDF & Image Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at top, #0d1e31 0%, #061424 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            /* Removido o overflow hidden que travava a tela */
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            position: relative;
            z-index: 10;
        }

        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
            /* Garante que o botão seja clicável */
            position: relative;
            z-index: 20;
        }

        .lang-btn.active { background: #00d2ff; color: #000; border-color: #00d2ff; font-weight: bold; }

        header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 2.5rem; font-weight: 800; }
        .logo span { background: #00d2ff; color: #061424; padding: 2px 10px; border-radius: 8px; margin-left: 8px; }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 30px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-mode {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px; border-radius: 12px; cursor: pointer;
        }
        .btn-mode.active { background: #00d2ff22; border-color: #00d2ff; color: #00d2ff; }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .drop-zone:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }

        .btn-main {
            background: #00d2ff;
            color: #061424;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        footer { margin-top: 30px; text-align: center; font-size: 0.7rem; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-switcher">
            <button class="lang-btn" id="btn-pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" id="btn-es" onclick="changeLanguage('es')">ES</button>
        </div>

        <header>
            <div class="logo">Vitor<span>Convert</span></div>
        </header>

        <main class="card">
            <div class="mode-selector">
                <button class="btn-mode active" id="mode-pdf" onclick="switchMode('pdf')">PDF para Word</button>
                <button class="btn-mode" id="mode-img" onclick="switchMode('img')">Imagem para PDF</button>
            </div>

            <div class="drop-zone" onclick="triggerInput()">
                <h3 id="mainText">Selecione o arquivo ou arraste aqui</h3>
                <p id="subText" style="opacity: 0.6; font-size: 0.8rem; margin-top: 10px;">Arquivos suportados: .pdf</p>
            </div>
            
            <input type="file" id="fileInput" style="display: none;" onchange="handleFile(this.files[0])">
            
            <button class="btn-main" id="actionBtn" onclick="triggerInput()">Escolher Arquivo</button>
        </main>

        <footer>
            <p>© 2026 VITORCONVERT • PROCESSAMENTO LOCAL SEGURO</p>
        </footer>
    </div>

    <script>
        let currentMode = 'pdf';
        let selectedFile = null;

        // 1. Função direta para abrir o seletor (Resolve o problema do clique)
        function triggerInput() {
            if (!selectedFile) {
                document.getElementById('fileInput').click();
            } else {
                alert("Iniciando conversão de: " + selectedFile.name);
                // Aqui você pode adicionar a lógica de conversão real
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            selectedFile = null;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
            
            const input = document.getElementById('fileInput');
            const sub = document.getElementById('subText');
            const main = document.getElementById('mainText');
            const btn = document.getElementById('actionBtn');

            if(mode === 'pdf') {
                input.accept = ".pdf";
                sub.innerText = "Arquivos suportados: .pdf";
            } else {
                input.accept = "image/*";
                sub.innerText = "Arquivos suportados: .jpg, .png";
            }
            
            main.innerText = "Selecione o arquivo ou arraste aqui";
            main.style.color = "#fff";
            btn.innerText = "Escolher Arquivo";
        }

        function handleFile(file) {
            if (!file) return;
            selectedFile = file;
            
            const main = document.getElementById('mainText');
            const btn = document.getElementById('actionBtn');

            main.innerText = "Arquivo: " + file.name;
            main.style.color = "#00d2ff"; // Neon
            btn.innerText = "Converter Agora";
        }

        function changeLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            // Lógica de tradução simplificada para focar no clique primeiro
            console.log("Idioma alterado para: " + lang);
        }

        // Previne que o navegador abra o arquivo se o usuário errar o arrasto
        window.addEventListener("dragover", function(e) { e.preventDefault(); }, false);
        window.addEventListener("drop", function(e) { e.preventDefault(); }, false);
    </script>
</body>
</html>
