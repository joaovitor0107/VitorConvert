<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitorConvert | PDF & Image Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-SEU_ID_AQUI" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at top, #0d1e31 0%, #061424 100%);
            color: #fff; font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .container { width: 100%; max-width: 500px; position: relative; z-index: 10; }
        .lang-switcher { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; }
        .lang-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;
        }
        .lang-btn.active { background: #00d2ff; color: #000; border-color: #00d2ff; font-weight: bold; }
        header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 2.5rem; font-weight: 800; }
        .logo span { background: #00d2ff; color: #061424; padding: 2px 10px; border-radius: 8px; margin-left: 8px; }
        .card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px; padding: 30px; backdrop-filter: blur(10px); text-align: center;
        }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-mode {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px; border-radius: 12px; cursor: pointer;
        }
        .btn-mode.active { background: #00d2ff22; border-color: #00d2ff; color: #00d2ff; }
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 20px;
            padding: 40px 20px; margin-bottom: 20px; cursor: pointer;
        }
        .btn-main {
            background: #00d2ff; color: #061424; border: none; width: 100%;
            padding: 18px; border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
        .ad-slot { margin: 15px 0; min-height: 90px; }
        footer { margin-top: 30px; text-align: center; font-size: 0.7rem; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-switcher">
            <button class="lang-btn" id="btn-pt" onclick="changeLanguage('pt')">PT</button>
            <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" id="btn-es" onclick="changeLanguage('es')">ES</button>
        </div>

        <header>
            <div class="logo">Vitor<span>Convert</span></div>
        </header>

        <main class="card">
            <div class="ad-slot">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-SEU_ID" data-ad-slot="SLOT_ID" data-ad-format="auto"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="mode-selector">
                <button class="btn-mode active" id="mode-pdf" onclick="switchMode('pdf')">PDF para Word</button>
                <button class="btn-mode" id="mode-img" onclick="switchMode('img')">Imagem para PDF</button>
            </div>

            <div class="drop-zone" onclick="triggerInput()">
                <h3 id="mainText">Selecione o arquivo ou arraste aqui</h3>
                <p id="subText" style="opacity: 0.6; font-size: 0.8rem; margin-top: 10px;">Arquivos suportados: .pdf</p>
            </div>
            
            <input type="file" id="fileInput" style="display: none;" onchange="handleFile(this.files[0])">
            <button class="btn-main" id="actionBtn" onclick="triggerInput()">Escolher Arquivo</button>

            <div class="ad-slot">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-SEU_ID" data-ad-slot="SLOT_ID" data-ad-format="auto"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
        </main>

        <footer>
            <p>© 2026 VITORCONVERT • PROCESSAMENTO LOCAL SEGURO</p>
        </footer>
    </div>

    <script>
        let currentMode = 'pdf';
        let selectedFile = null;
        let waiting = false;

        function triggerInput() {
            if (waiting) return;
            if (!selectedFile) {
                document.getElementById('fileInput').click();
            } else {
                startCountdown();
            }
        }

        function handleFile(file) {
            if (!file) return;
            selectedFile = file;
            document.getElementById('mainText').innerText = "Arquivo: " + file.name;
            document.getElementById('mainText').style.color = "#00d2ff";
            document.getElementById('actionBtn').innerText = "Converter Agora";
        }

        function startCountdown() {
            waiting = true;
            let count = 5;
            const btn = document.getElementById('actionBtn');
            const timer = setInterval(() => {
                btn.innerText = Aguarde ${count}s...;
                count--;
                if (count < 0) {
                    clearInterval(timer);
                    btn.innerText = "Convertendo...";
                    if (currentMode === 'img') processImg();
                    else { alert("PDF para Word indisponível"); resetBtn(); }
                }
            }, 1000);
        }

        function resetBtn() {
            waiting = false;
            document.getElementById('actionBtn').innerText = "Converter Agora";
        }

        async function processImg() {
            try {
                const { PDFDocument } = PDFLib;
                const pdfDoc = await PDFDocument.create();
                const image = await (selectedFile.type.includes("png") ? pdfDoc.embedPng(await selectedFile.arrayBuffer()) : pdfDoc.embedJpg(await selectedFile.arrayBuffer()));
                const page = pdfDoc.addPage([image.width, image.height]);
                page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
                const pdfBytes = await pdfDoc.save();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([pdfBytes], { type: "application/pdf" }));
                link.download = "convertido.pdf";
                link.click();
            } catch (e) { alert("Erro no arquivo."); }
            resetBtn();
        }

        function switchMode(mode) {
            if (waiting) return;
            currentMode = mode;
            selectedFile = null;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
            document.getElementById('subText').innerText = mode === 'pdf' ? "Arquivos suportados: .pdf" : "Arquivos suportados: .jpg, .png";
            document.getElementById('mainText').innerText = "Selecione o arquivo ou arraste aqui";
            document.getElementById('mainText').style.color = "#fff";
            document.getElementById('actionBtn').innerText = "Escolher Arquivo";
        }

        function changeLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
        }
    </script>
</body>
</html>
